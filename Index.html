<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>


        <div class="container border rounded-5 shadow-lg p-3 mb-2 bg-white text-dark"
            style="margin-top: 200px; max-width: 600px;">

            <form id="formulario" class="row g-3 needs-validation" novalidate>

                <div style="margin-top: 50px;">
                    <h2 class="text-center ">Login</h2>
                    <p class="text-center"> Preencha os dados para entrar no fórum.</p>
                </div>


                <div class="col-md-12">
                    <label for="usuario" class="form-label">Nome de usuário</label>
                    <input type="text" class="form-control" id="usuario">
                    <div id="invalid-feedback">
                    </div>
                </div>


                <div class="col-md-12">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" required>
                    <div id="invalid-feedback">
                    </div>
                </div>


                <div class="d-grid gap-2" style="margin-bottom: 20px;">
                    <button class="btn btn-primary" type="submit">Entrar</button>
                </div>
        </div>
        </form>



    </main>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
<script src="script.js"></script>

</html>
