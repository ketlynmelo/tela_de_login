<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum The Walking Dead</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<main>
  <body>

<header class="bg-dark text-white text-center p-4 shadow">
    <h1>Fórum The Walking Dead</h1>
</header>

<main class="container my-5">

    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

        <img src="assets/image/Foto principal home.jpg"" 
             class="card-img-top img-fluid" 
             alt="Rick Grimes">

        <div class="card-body text-center p-4">

            <h2 class="card-title fw-bold">Bem-vindo!</h2>

            <p class="card-text fs-5 text-muted">
                Este fórum é dedicado ao lendário seriado norte americano, The Walking Dead.
                Aqui você pode conhecer sua história e discutir seus melhores momentos!
            </p>

            <button class="btn btn-dark px-4 py-2 mt-3">
                Entrar no Fórum
            </button>

        </div>

    </div>

</main>

<footer class="bg-dark text-white text-center p-3 mt-5">
    <p class="mb-0">Fórum criado por Ketlyn de Melo e Matheus Bernardo de Oliveira Rüeckl</p>
</footer>

</body>
</html>
